name: Publish ctx-tree to npm

on:
  push:
    tags:
      # v0.1.0, v1.2.3 — but NOT vscode-v* (the bare `v*` glob matched those too)
      - 'v[0-9]*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build
        working-directory: packages/ctx-tree
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish
        working-directory: packages/ctx-tree
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
